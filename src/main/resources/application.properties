spring.application.name=medufly

# ── Database ──────────────────────────────────────────────────────────────────
# Defaults to H2 in-memory for local dev; override with environment variables in prod
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:medufly;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true

# ── Green API (WhatsApp notifications) ────────────────────────────────────────
greenapi.instance-id=${GREEN_API_INSTANCE_ID:}
greenapi.token=${GREEN_API_TOKEN:}
greenapi.recipient-number=918084842777

# ── CORS ──────────────────────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
